# use zsh
set-option -g default-command "reattach-to-user-namespace -l zsh"
set-option -g default-command "/bin/zsh -l"

# use Ctrl-a as prefix key
unbind C-b
set-option -g prefix C-a
bind-key C-Space send-prefix

# less command delay
set -s escape-time 1

# window and panel indices starts by 1
set -g base-index 1
setw -g pane-base-index 1


# Style - Dayfox (nightfox)
bg="#e4dcd4"
fg="#643f61"
accent="#6e33ce"
secondary="#824d5b"

# status-bar on top
set -g status-position top
set -g status-left-length 120
set -g status-style "fg=${fg},bg=default"
set -g status-left "#[fg=${fg},bold]  #S #[fg=${fg},nobold] | "
set -g status-right-length 150
set -g status-right "  #{b:pane_current_path} | 󱃾 #{kubectx_context} |   #{cpu_percentage}    #{ram_percentage}  󱊣 #{battery_percentage} "
set -g window-status-current-format "#[fg=${accent},bold]  #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${fg},bg=default"
set -g mode-style "fg=${bg},bg=${fg}"
set -g pane-border-style "fg=${fg}"
set -g pane-active-border-style "fg=${accent}"

# reload tmux config with r
bind r source-file ~/.config/tmux/tmux.conf

# split panel with h and v
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# panel navigation with vi-keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panel 
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# for nvim copy mode
setw -g mode-keys vi
bind Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
unbind p
bind p paste-buffer

bind -n M-h previous-window
bind -n M-l next-window

# mouse support
set -g mouse on
set -s set-clipboard on

# i need color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%dm'


set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tony-sol/tmux-kubectx'

set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
